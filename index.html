<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hashed Network · Hydra</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f8f7f5;--bg3:#f0ede8;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.16);
  --r:8px;--rl:12px;
  --blue:#185FA5;--blue-bg:#dceefa;--blue-text:#0d4f8a;
  --green:#0F6E56;--green-bg:#dcf5ec;--green-text:#0a5c3f;
  --purple:#534AB7;--purple-bg:#eceafe;--purple-text:#3d2fa0;
  --coral:#993C1D;--coral-bg:#fde8e0;--coral-text:#7a2a10;
  --amber:#854F0B;--amber-bg:#fef0d8;--amber-text:#6b3a04;
  --notion:#2383E2;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1c;--bg2:#252525;--bg3:#2e2e2c;
  --text:#e5e5e5;--text2:#999;--text3:#555;
  --border:rgba(255,255,255,.09);--border2:rgba(255,255,255,.18);
  --blue-bg:#0d2d4a;--blue-text:#7ab8f5;
  --green-bg:#0a2e25;--green-text:#5dd4a8;
  --purple-bg:#1e1b40;--purple-text:#b0aaff;
  --coral-bg:#3a1508;--coral-text:#f4a07a;
  --amber-bg:#301a03;--amber-text:#f5c87a;
}}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
.app{max-width:1000px;margin:0 auto;padding:1.5rem 1.25rem}
.topbar{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1.25rem}
.topbar h1{font-size:18px;font-weight:600;letter-spacing:-.01em}
.topbar .sub{font-size:12px;color:var(--text2)}
.tabs{display:flex;border-bottom:0.5px solid var(--border);margin-bottom:1.25rem;gap:0}
.tab{padding:8px 16px;font-size:13px;font-weight:400;color:var(--text2);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-0.5px;transition:color .15s}
.tab.active{color:var(--text);font-weight:500;border-bottom-color:var(--text)}
.tab:hover:not(.active){color:var(--text)}
.panel{display:none}.panel.active{display:block}

/* Search */
.search-wrap{position:relative;margin-bottom:.75rem}
.search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none}
.search-wrap input{width:100%;padding:9px 12px 9px 34px;font-size:14px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--text3)}
.filters{display:flex;gap:8px;margin-bottom:.75rem;flex-wrap:wrap}
.filters select{padding:6px 10px;font-size:12px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);cursor:pointer;outline:none}
.meta{font-size:12px;color:var(--text3);margin-bottom:.5rem;height:16px}
.col-headers{display:grid;grid-template-columns:1.8fr 1.8fr 1.2fr 90px;gap:10px;padding:0 8px 6px;border-bottom:0.5px solid var(--border)}
.col-headers span{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;color:var(--text3)}
.contact-list{}
.crow{display:grid;grid-template-columns:1.8fr 1.8fr 1.2fr 90px;gap:10px;align-items:center;padding:9px 8px;border-bottom:0.5px solid var(--border);cursor:pointer;transition:background .1s;border-radius:4px}
.crow:hover{background:var(--bg2)}
.cn{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc,.cp{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cs{display:flex;gap:3px;justify-content:flex-end;flex-wrap:wrap}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.b-Les{background:var(--green-bg);color:var(--green-text)}
.b-John{background:var(--blue-bg);color:var(--blue-text)}
.b-Abby{background:var(--purple-bg);color:var(--purple-text)}
.b-Leah{background:var(--coral-bg);color:var(--coral-text)}
.b-Patrick{background:var(--amber-bg);color:var(--amber-text)}
.b-multi{background:var(--bg3);color:var(--text2)}
.load-more{width:100%;padding:9px;font-size:13px;color:var(--text2);background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);cursor:pointer;margin-top:8px;transition:background .15s}
.load-more:hover{background:var(--bg3)}

/* AI */
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.875rem}
.chip{padding:5px 11px;font-size:12px;border:0.5px solid var(--border2);border-radius:20px;cursor:pointer;background:var(--bg2);color:var(--text2);transition:all .15s;white-space:nowrap}
.chip:hover{background:var(--bg3);color:var(--text);border-color:var(--text3)}
.ai-box{border:0.5px solid var(--border2);border-radius:var(--rl);padding:1rem}
.ai-box textarea{width:100%;resize:none;border:none;background:transparent;font-size:14px;color:var(--text);font-family:inherit;outline:none;line-height:1.6}
.ai-footer{display:flex;justify-content:space-between;align-items:center;margin-top:.625rem;gap:8px}
.ai-footer span{font-size:12px;color:var(--text3)}
.ai-resp{background:var(--bg2);border-radius:var(--rl);padding:1.25rem;font-size:14px;line-height:1.7;margin-top:.875rem}
.ai-resp h3{font-size:13px;font-weight:600;margin:1rem 0 .375rem;text-transform:uppercase;letter-spacing:.03em;color:var(--text2)}
.ai-resp h3:first-child{margin-top:0}
.ai-resp ul{padding-left:1.25rem;margin:.25rem 0 .625rem}
.ai-resp li{margin-bottom:.2rem}
.ai-resp strong{font-weight:600}
.ai-resp p{margin-bottom:.5rem}
.ai-resp p:last-child{margin-bottom:0}
.thinking{color:var(--text3);font-style:italic;font-size:13px}

/* Dashboard */
.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:1.25rem}
.stat{background:var(--bg2);border-radius:var(--r);padding:.875rem 1rem}
.stat-val{font-size:22px;font-weight:600;letter-spacing:-.02em;margin-bottom:2px}
.stat-lbl{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
.src-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:1.25rem}
.src-card{border:0.5px solid var(--border);border-radius:var(--rl);padding:.875rem;text-align:center;cursor:pointer;transition:all .15s}
.src-card:hover{background:var(--bg2);border-color:var(--border2)}
.sc-val{font-size:20px;font-weight:600;letter-spacing:-.01em;margin-bottom:2px}
.sc-nm{font-size:12px;font-weight:500;margin-bottom:1px}
.sc-sub{font-size:11px;color:var(--text3)}
.chart-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:.75rem}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.bar-lbl{font-size:11px;color:var(--text2);width:128px;text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;background:var(--bg3);border-radius:2px;height:18px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:2px;display:flex;align-items:center;justify-content:flex-end;padding-right:5px;transition:width .5s ease}
.bar-n{font-size:10px;font-weight:600}
.ol-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:0.5px solid var(--border);font-size:12px}
.ol-row:last-child{border-bottom:none}
.ol-n{flex:1;display:flex;gap:3px;flex-wrap:wrap}
.ol-c{font-weight:600;color:var(--text2);white-space:nowrap}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(2px)}
.modal{background:var(--bg);border-radius:var(--rl);padding:1.5rem;max-width:480px;width:calc(100% - 2rem);border:0.5px solid var(--border2);max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.modal-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:1rem}
.avatar{width:46px;height:46px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:15px;border:0.5px solid var(--border);flex-shrink:0;letter-spacing:.02em}
.modal-name{font-size:16px;font-weight:600;margin-bottom:3px}
.modal-role{font-size:13px;color:var(--text2);margin-bottom:.5rem}
.m-row{display:flex;gap:10px;padding:7px 0;border-bottom:0.5px solid var(--border);font-size:13px;align-items:flex-start}
.m-row:last-child{border-bottom:none}
.m-lbl{color:var(--text3);width:72px;flex-shrink:0;font-size:11px;text-transform:uppercase;letter-spacing:.04em;padding-top:1px;font-weight:500}
.modal-actions{display:flex;gap:8px;margin-top:1.125rem;flex-wrap:wrap}
.btn-primary{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;font-size:13px;font-weight:500;background:var(--text);color:var(--bg);border:none;border-radius:var(--r);cursor:pointer;transition:opacity .15s;white-space:nowrap}
.btn-primary:hover{opacity:.82}
.btn-primary:disabled{opacity:.35;cursor:default}
.btn-notion{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;font-size:13px;font-weight:500;background:var(--notion);color:#fff;border:none;border-radius:var(--r);cursor:pointer;transition:opacity .15s;white-space:nowrap}
.btn-notion:hover{opacity:.88}
.btn-notion:disabled{opacity:.4;cursor:default}
.btn-sec{display:inline-flex;align-items:center;gap:5px;padding:8px 12px;font-size:13px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg2);color:var(--text);cursor:pointer;transition:background .15s;white-space:nowrap}
.btn-sec:hover{background:var(--bg3)}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;padding:10px 16px;border-radius:var(--r);font-size:13px;font-weight:500;z-index:9999;display:flex;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(0,0,0,.15);animation:slideIn .2s ease}
.toast-success{background:#1a7a4a;color:#fff}
.toast-error{background:#b92c2c;color:#fff}
.toast-loading{background:var(--bg);color:var(--text);border:0.5px solid var(--border2)}
@keyframes slideIn{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.notion-saved{background:var(--green-bg);color:var(--green-text);border:0.5px solid rgba(15,110,86,.2)}

/* Buttons */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
@media(max-width:640px){
  .crow{grid-template-columns:1fr 1fr}.cp,.cs{display:none}
  .stats-grid,.src-grid{grid-template-columns:repeat(2,1fr)}
  .two-col{grid-template-columns:1fr}
  .col-headers{grid-template-columns:1fr 1fr}
  .col-headers span:nth-child(3),.col-headers span:nth-child(4){display:none}
}
</style>
</head>
<body>
<div id="loader" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;gap:16px;z-index:9999">
  <div style="font-family:-apple-system,sans-serif;font-size:18px;font-weight:600">🕸️ Hashed Network</div>
  <div style="width:260px;height:3px;background:#f0ede8;border-radius:2px;overflow:hidden">
    <div id="lBar" style="height:100%;width:2%;background:#1a1a1a;border-radius:2px;transition:width .15s ease"></div>
  </div>
  <div id="lLbl" style="font-family:-apple-system,sans-serif;font-size:13px;color:#999">Loading network data...</div>
</div>
<div id="mainApp" style="display:none">
<div class="app">
  <div class="topbar">
    <h1>🕸️ Hashed Network</h1>
    <span class="sub" id="hSub">Loading...</span>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('search')"><i class="ti ti-search" aria-hidden="true"></i> Search</button>
    <button class="tab" onclick="showTab('ai')"><i class="ti ti-sparkles" aria-hidden="true"></i> Ask AI</button>
    <button class="tab" onclick="showTab('dash')"><i class="ti ti-chart-bar" aria-hidden="true"></i> Dashboard</button>
  </div>

  <div id="tab-search" class="panel active">
    <div class="search-wrap">
      <i class="ti ti-search" aria-hidden="true"></i>
      <input type="text" id="sIn" placeholder="Search name, company, title, email..." oninput="doSearch()" autocomplete="off" aria-label="Search contacts"/>
    </div>
    <div class="filters">
      <select id="fSrc" onchange="doSearch()" aria-label="Filter by person">
        <option value="">All 5 people</option>
        <option>Les</option><option>John</option><option>Abby</option><option>Leah</option><option>Patrick</option>
      </select>
      <select id="fTier" onchange="doSearch()" aria-label="Filter by seniority">
        <option value="">All seniority</option>
        <option value="ceo">CEO / Founder</option>
        <option value="chief">C-Suite</option>
        <option value="president">President</option>
        <option value="vp">VP</option>
        <option value="director">Director</option>
        <option value="partner">Partner</option>
        <option value="manager">Manager</option>
      </select>
      <select id="fShared" onchange="doSearch()" aria-label="Filter by shared status">
        <option value="">All contacts</option>
        <option value="shared">Shared (2+ people)</option>
        <option value="unique">Unique to one person</option>
      </select>
    </div>
    <div class="meta" id="meta" aria-live="polite"></div>
    <div class="col-headers" aria-hidden="true">
      <span>Name</span><span>Company</span><span>Title</span><span style="text-align:right">Via</span>
    </div>
    <div class="contact-list" id="list" role="list" aria-label="Contact results"></div>
    <button class="load-more" id="moreBtn" onclick="loadMore()" style="display:none">Load more results</button>
  </div>

  <div id="tab-ai" class="panel">
    <div class="chips" id="chips" role="list" aria-label="Quick queries"></div>
    <div class="ai-box">
      <textarea id="aiQ" rows="3" placeholder="Ask anything about your network...&#10;&#10;'Who do we know at Ascension?' · 'Find the best warm path into Rush University Medical Center' · 'Draft a LinkedIn outreach to this contact about Juliana Care'" aria-label="AI query input"></textarea>
      <div class="ai-footer">
        <span>Searches all 22,056 contacts · powered by Claude</span>
        <button class="btn-primary" id="askBtn" onclick="askAI()"><i class="ti ti-sparkles" aria-hidden="true"></i> Ask</button>
      </div>
    </div>
    <div id="aiOut" style="display:none" aria-live="polite"></div>
  </div>

  <div id="tab-dash" class="panel">
    <div class="stats-grid" id="statsGrid"></div>
    <div class="src-grid" id="srcGrid"></div>
    <div class="two-col">
      <div>
        <div class="chart-title">Top organizations</div>
        <div id="coChart"></div>
      </div>
      <div>
        <div class="chart-title">Network overlap</div>
        <div id="olChart"></div>
        <div style="margin-top:1.5rem">
          <div class="chart-title">Seniority</div>
          <div id="tierChart"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="modal"></div>
<div id="toast"></div>
</div>
<script>
let DB = [];

async function loadData(){
  const bar=document.getElementById('lBar');
  const lbl=document.getElementById('lLbl');
  try{
    const resp=await fetch('data.json');
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const total=parseInt(resp.headers.get('Content-Length')||'2570000');
    const reader=resp.body.getReader();
    const chunks=[];
    let loaded=0;
    while(true){
      const{done,value}=await reader.read();
      if(done)break;
      chunks.push(value);
      loaded+=value.length;
      bar.style.width=Math.min(Math.round(loaded/total*85),85)+'%';
      lbl.textContent='Loading '+Math.round(loaded/1024/1024*10)/10+'MB of 2.5MB...';
    }
    bar.style.width='92%';
    lbl.textContent='Parsing 22,056 contacts...';
    await new Promise(r=>setTimeout(r,20));
    const buf=new Uint8Array(loaded);
    let off=0;for(const c of chunks){buf.set(c,off);off+=c.length;}
    DB=JSON.parse(new TextDecoder().decode(buf));
    bar.style.width='100%';
    lbl.textContent=DB.length.toLocaleString()+' contacts ready ✓';
    await new Promise(r=>setTimeout(r,250));
    document.getElementById('loader').style.display='none';
    document.getElementById('mainApp').style.display='block';
    initApp();
  }catch(e){
    lbl.textContent='Error: '+e.message;
    lbl.style.color='#c00';
    console.error('Hydra load error:',e);
  }
}
</script>
<script>
// ── Config ────────────────────────────────────────────────
const NOTION_DB_ID = 'bfdd828e-93e7-4ad7-82e7-705755359ffc';
const SOURCE_MAP = {Les:'b-Les',John:'b-John',Abby:'b-Abby',Leah:'b-Leah',Patrick:'b-Patrick'};
const SRC_COLORS = {
  Les:{c:'#1D9E75',light:'#dcf5ec',dark:'#0a5c3f'},
  John:{c:'#378ADD',light:'#dceefa',dark:'#0d4f8a'},
  Abby:{c:'#7F77DD',light:'#eceafe',dark:'#3d2fa0'},
  Leah:{c:'#D85A30',light:'#fde8e0',dark:'#7a2a10'},
  Patrick:{c:'#BA7517',light:'#fef0d8',dark:'#6b3a04'}
};

// ── State ─────────────────────────────────────────────────
let results=[], offset=0;
const PAGE=50;
const savedToNotion=new Set();

// ── Init ──────────────────────────────────────────────────
// hSub set in initApp()

const CHIPS=[
  ['Who do we know at health systems in the Midwest?','ti-building-hospital'],
  ['Find all Chief Medical Officers in the network','ti-stethoscope'],
  ['Best warm path into Epic, Cerner, or Oracle Health','ti-route'],
  ['Healthcare PE and venture investors','ti-trending-up'],
  ['Who do we know at Vanderbilt or VUMC?','ti-school'],
  ['Find health tech founders across all 5 networks','ti-rocket'],
  ['Who can intro us to Ascension or CommonSpirit leadership?','ti-users'],
  ['Draft outreach introducing Juliana Care to a health system CMO','ti-mail'],
];
// chips set in initApp()

// ── Helpers ───────────────────────────────────────────────
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function badge(s,multi){
  if(multi)return`<span class="badge b-multi">${s}</span>`;
  return`<span class="badge ${SOURCE_MAP[s]||'b-multi'}">${s}</span>`;
}

function srcBadges(srcs){
  if(!srcs||!srcs.length)return'';
  if(srcs.length===1)return badge(srcs[0]);
  if(srcs.length===2)return srcs.map(s=>badge(s)).join('');
  return badge(`${srcs.length} people`,true);
}

function showTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['search','ai','dash'][i]===t));
  document.querySelectorAll('.panel').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='dash'&&!dashDone)renderDash();
}

function showToast(msg,type='loading',dur=3000){
  const t=document.getElementById('toast');
  const icons={loading:'ti-loader-2',success:'ti-check',error:'ti-alert-circle'};
  t.innerHTML=`<div class="toast toast-${type}"><i class="ti ${icons[type]}" aria-hidden="true"></i> ${msg}</div>`;
  if(dur>0)setTimeout(()=>{if(t.firstChild)t.firstChild.style.opacity='0';setTimeout(()=>t.innerHTML='',300);},dur);
}

// ── Search ────────────────────────────────────────────────
function doSearch(){
  const q=(document.getElementById('sIn').value||'').toLowerCase().trim();
  const src=document.getElementById('fSrc').value;
  const tier=document.getElementById('fTier').value;
  const shared=document.getElementById('fShared').value;
  results=DB.filter(c=>{
    const[f,l,co,pos,em,url,dt,srcs]=c;
    if(src&&!srcs.includes(src))return false;
    if(tier&&!(pos||'').toLowerCase().includes(tier))return false;
    if(shared==='shared'&&srcs.length<2)return false;
    if(shared==='unique'&&srcs.length>1)return false;
    if(!q)return true;
    return q.split(' ').every(w=>`${f} ${l} ${co} ${pos} ${em}`.toLowerCase().includes(w));
  });
  offset=0;
  renderList();
}

function renderList(){
  const list=document.getElementById('list');
  const meta=document.getElementById('meta');
  const btn=document.getElementById('moreBtn');
  const slice=results.slice(0,PAGE);
  offset=slice.length;
  meta.textContent=results.length?`${results.length.toLocaleString()} contacts`:'';
  if(!results.length){
    list.innerHTML='<div style="padding:2.5rem;text-align:center;color:var(--text3);font-size:13px">No contacts match your search</div>';
    btn.style.display='none';return;
  }
  list.innerHTML=slice.map(c=>rowHTML(c)).join('');
  btn.style.display=results.length>offset?'block':'none';
}

function rowHTML(c){
  const[f,l,co,pos,em,url,dt,srcs]=c;
  const idx=DB.indexOf(c);
  const name=`${f} ${l}`.trim()||'(no name)';
  const saved=savedToNotion.has(url||`${f}${l}`);
  return`<div class="crow${saved?' notion-saved':''}" onclick="openC(${idx})" role="listitem" aria-label="${esc(name)}, ${esc(co)}">
    <div class="cn">${saved?'<i class="ti ti-check" style="color:var(--green);margin-right:4px;font-size:12px" aria-label="Saved to Notion"></i>':''}${esc(name)}</div>
    <div class="cc">${esc(co||'—')}</div>
    <div class="cp">${esc(pos||'—')}</div>

// ── Save to Notion ────────────────────────────────────────
async function saveToNotion(idx){
  const c=DB[idx];
  const[f,l,co,pos,em,url,dt,srcs]=c;
  const name=`${f} ${l}`.trim()||'(no name)';
  
  const btn=document.getElementById('notionBtn');
  if(btn){btn.disabled=true;btn.innerHTML='<i class="ti ti-loader-2"></i> Saving...';}
  showToast(`Saving ${name} to Hydra...`,'loading',0);
  
  const notionSource=srcs.includes('John')?'John Bass':'Manual';
  const srcNote=`Via: ${srcs.join(', ')}. Added from Hydra network tool.`;
  
  let connectedDate=null;
  if(dt){
    try{
      const months={Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',
        Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
      const m1=dt.match(/(\d{1,2})[\s-]([A-Za-z]{3})[\s-]?(\d{4})/);
      const m2=dt.match(/([A-Za-z]{3})[\s-](\d{1,2})[,\s]+(\d{4})/);
      const m3=dt.match(/(\d{4})-(\d{2})-(\d{2})/);
      if(m1&&months[m1[2].slice(0,3)])connectedDate=`${m1[3]}-${months[m1[2].slice(0,3)]}-${m1[1].padStart(2,'0')}`;
      else if(m2&&months[m2[1].slice(0,3)])connectedDate=`${m2[3]}-${months[m2[1].slice(0,3)]}-${m2[2].padStart(2,'0')}`;
      else if(m3)connectedDate=m3[0];
    }catch(e){}
  }
  
  const co_l=(co||'').toLowerCase();
  const pos_l=(pos||'').toLowerCase();
  let sectors=[];
  if(/health system|hospital|medical center|health network|medical group|integrated|idn/.test(co_l))sectors.push('Health system');
  if(/insur|payer|aetna|cigna|united health|humana|bcbs|anthem/.test(co_l))sectors.push('Payer');
  if(/venture|\bvc\b|capital|invest|fund|\bpe\b|equity/.test(co_l+' '+pos_l))sectors.push('VC / PE');
  if(/pharma|biotech|medtech|device|therapeutics|rx/.test(co_l))sectors.push('Pharma / medtech');
  if(/consult|advisory|mckinsey|bain|deloitte|accenture|pwc|kpmg/.test(co_l))sectors.push('Consulting');
  if(/recruit|staffing|talent|search/.test(co_l+' '+pos_l))sectors.push('Talent / recruiting');
  if(!sectors.length&&(/tech|software|saas|digital|platform|health tech|healthtech/.test(co_l+' '+pos_l)))sectors.push('Digital health');
  if(!sectors.length)sectors=['Other'];
  
  // Use Anthropic API with Notion MCP to create the page
  const prompt=`Create a new page in the Notion database with ID "${NOTION_DB_ID}" with these exact properties:
- Name (title): "${name}"
- Title (text): "${pos||''}"
- Organization (text): "${co||''}"
- Email (email): ${em?`"${em}"`:'null'}
- LinkedIn URL (url): ${url?`"https://www.linkedin.com/in/${url}"`:'null'}
- Source (select): "${notionSource}"
- Sector (multi_select): ${JSON.stringify(sectors)}
- Notes (rich_text): "${srcNote}"
${connectedDate?`- Connected On (date): "${connectedDate}"`:''}

Use the notion-create-pages tool to create this page.`;
  
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:500,
        messages:[{role:'user',content:prompt}],
        mcp_servers:[{type:'url',url:'https://mcp.notion.com/mcp',name:'notion'}]
      })
    });
    const data=await res.json();
    
    // Check for success - look for tool result or text confirmation
    const hasError=data.content?.some(b=>b.type==='text'&&b.text?.toLowerCase().includes('error'));
    const hasToolUse=data.content?.some(b=>b.type==='tool_use'||b.type==='mcp_tool_use');
    const hasResult=data.content?.some(b=>b.type==='mcp_tool_result'||b.type==='tool_result');
    
    if(data.error){
      throw new Error(data.error.message||'API error');
    }
    
    // Mark as saved
    const key=url||`${f}${l}`;
    savedToNotion.add(key);
    showToast(`${name} saved to Hydra ✓`,'success');
    if(btn){btn.innerHTML='<i class="ti ti-check"></i> Saved to Hydra';btn.disabled=true;}
    doSearch();
    
  }catch(e){
    console.error('Notion save error:',e);
    showToast(`Save failed: ${e.message}`,'error');
    if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-database"></i> Save to Hydra';}
  }
}

// ── AI ────────────────────────────────────────────────────
function setQ(q){
  document.getElementById('aiQ').value=q;
  document.getElementById('aiQ').focus();
}

async function askAI(){
  const query=document.getElementById('aiQ').value.trim();
  if(!query)return;
  const btn=document.getElementById('askBtn');
  const out=document.getElementById('aiOut');
  btn.disabled=true;btn.innerHTML='<i class="ti ti-loader-2"></i> Thinking...';
  out.style.display='block';
  out.innerHTML='<div class="ai-resp"><span class="thinking">Searching your network and reasoning over results...</span></div>';
  
  const stopWords=new Set(['the','and','for','with','that','this','what','who','how','into','from','about','does','are','our','their','any','you','can','find','all','best','most','across','networks','connections','know']);
  const terms=query.toLowerCase().split(/\s+/).filter(w=>w.length>3&&!stopWords.has(w));
  
  const relevant=DB.filter(c=>{
    const[f,l,co,pos]=c;
    const hay=`${f} ${l} ${co} ${pos}`.toLowerCase();
    return terms.some(t=>hay.includes(t));
  }).slice(0,120);
  
  const srcCounts={};
  DB.forEach(c=>c[7].forEach(s=>srcCounts[s]=(srcCounts[s]||0)+1));
  
  const ctx=relevant.map(c=>{
    const[f,l,co,pos,em,url,dt,srcs]=c;
    const strength=srcs.length>1?` [SHARED: ${srcs.join('+')}]`:'';
    return`${f} ${l} | ${pos||'?'} | ${co||'?'} | via ${srcs.join(',')}${strength}${em?' | email:'+em:''}`;
  }).join('\n');
  
  const sys=`You are a network intelligence analyst for Hashed Health, a healthcare venture studio and VC firm based in Nashville.

Team whose networks you cover:
- Les (4,295 connections) — Co-founder/senior leader
- John Bass (15,332 connections) — Co-founder, broad healthcare network  
- Abby Schwing (1,447 connections) — Leads discovery on "Insider" concept
- Leah Callahan (1,083 connections) — Commercialization, partnerships, HLTH events
- Patrick (3,364 connections) — Team member

Key Hashed Health context:
- Portfolio: Juliana Care — hospital-embedded care model for polychronic/medically complex patients; sells to health systems and IDNs; buyers = CMOs, CFOs, VP Clinical Operations
- Building "Insider" — platform connecting experienced healthcare executives who've left large institutions with emerging companies (contracting, compliance, invoicing)
- Runs startup pitch programs at HLTH events

When answering queries:
1. Name specific contacts with title, company, and which team member knows them
2. Contacts known by 2+ team members = stronger intro path — call this out explicitly
3. Prioritize C-suite, founders, and clinical/operational leaders for health system queries
4. For warm paths: recommend the specific team member best positioned to make the intro
5. For outreach drafts: concise, genuine, no performative openers, no fluff
6. Be specific — real names, companies, why they're relevant to the use case

Format with clear sections. Use ### for headers.`;

  const msg=`Query: ${query}

Relevant contacts found (${relevant.length}):
${ctx||'No specific keyword matches — answer from general network context and provide strategic guidance.'}`;
  
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1200,system:sys,messages:[{role:'user',content:msg}]})
    });
    const data=await res.json();
    const text=data.content?.find(b=>b.type==='text')?.text||'No response received.';
    out.innerHTML=`<div class="ai-resp">${fmt(text)}</div>`;
  }catch(e){
    out.innerHTML=`<div class="ai-resp" style="color:#b92c2c">Error: ${e.message}</div>`;
  }
  btn.disabled=false;btn.innerHTML='<i class="ti ti-sparkles"></i> Ask';
}

function fmt(t){
  return t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h3>$1</h3>')
    .replace(/^[-•] (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[^<]*<\/li>\n?)+/g,m=>`<ul>${m}</ul>`)
    .replace(/\n\n+/g,'</p><p>')
    .replace(/([^>])\n([^<])/g,'$1 $2')
    .replace(/^(?!<)/gm,'<p>').replace(/(?<!>)$/gm,'</p>')
    .replace(/<p><\/p>/g,'').replace(/<p>(<[hul])/g,'$1').replace(/(<\/[hul][^>]*>)<\/p>/g,'$1');
}

function draftOutreach(idx){
  const c=DB[idx];
  const[f,l,co,pos,,,,srcs]=c;
  closeModal();
  showTab('ai');
  document.getElementById('aiQ').value=`Draft a concise, genuine LinkedIn connection request or message to ${f} ${l}, ${pos||'a professional'} at ${co||'their company'}. They are connected to ${srcs.join(' and ')} at Hashed Health. Purpose: introduce Hashed Health as a healthcare venture studio, briefly note relevance to their work, and invite a short call. Tone: warm, direct, peer-to-peer — no fluff, no performative openers.`;
  askAI();
}

// ── Dashboard ─────────────────────────────────────────────
let dashDone=false;
function renderDash(){
  dashDone=true;
  const srcC={Les:0,John:0,Abby:0,Leah:0,Patrick:0};
  const coC={};
  const tierC={'CEO/Founder':0,'C-Suite':0,'VP':0,'Director':0,'Manager':0,'Partner':0};
  const olC={};
  
  DB.forEach(c=>{
    const[f,l,co,pos,em,url,dt,srcs]=c;
    srcs.forEach(s=>{if(s in srcC)srcC[s]++;});
    if(co&&!['Self-employed','Freelance','Self Employed','Retired','Stealth Startup','Stealth','Self-Employed','Unemployed'].includes(co))
      coC[co]=(coC[co]||0)+1;
    const p=(pos||'').toLowerCase();
    if(/ceo|founder|co-founder|president/.test(p))tierC['CEO/Founder']++;
    else if(/\bchief\b/.test(p))tierC['C-Suite']++;
    else if(/\bvp\b|vice president/.test(p))tierC['VP']++;
    else if(/\bdirector\b|head of/.test(p))tierC['Director']++;
    else if(/\bmanager\b|\blead\b/.test(p))tierC['Manager']++;
    else if(/\bpartner\b/.test(p))tierC['Partner']++;
    if(srcs.length>1){const k=srcs.slice().sort().join('+');olC[k]=(olC[k]||0)+1;}
  });
  
  const shared=DB.filter(c=>c[7].length>1).length;
  const withEmail=DB.filter(c=>c[4]).length;
  const cSuite=tierC['CEO/Founder']+tierC['C-Suite'];
  
  document.getElementById('statsGrid').innerHTML=[
    [DB.length.toLocaleString(),'Total contacts'],
    [shared.toLocaleString(),'Shared connections'],
    [Object.keys(coC).length.toLocaleString(),'Organizations'],
    [withEmail.toLocaleString(),'Have email'],
    [cSuite.toLocaleString(),'C-suite & founders'],
  ].map(([v,l])=>`<div class="stat"><div class="stat-val">${v}</div><div class="stat-lbl">${l}</div></div>`).join('');
  
  document.getElementById('srcGrid').innerHTML=Object.entries(srcC).map(([n,cnt])=>`
    <div class="src-card" onclick="filterSrc('${n}')" style="border-color:${SRC_COLORS[n].c}40">
      <div class="sc-val" style="color:${SRC_COLORS[n].c}">${cnt.toLocaleString()}</div>
      <div class="sc-nm">${n}</div>
      <div class="sc-sub">connections · click to filter</div>
    </div>`).join('');
  
  const topCo=Object.entries(coC).sort((a,b)=>b[1]-a[1]).slice(0,12);
  const mx=topCo[0]?.[1]||1;
  document.getElementById('coChart').innerHTML=topCo.map(([co,n])=>`
    <div class="bar-row">
      <div class="bar-lbl" title="${esc(co)}">${co.length>20?co.slice(0,20)+'…':co}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${Math.round(n/mx*100)}%;background:#dceefa;border-right:2px solid #378ADD">
          <span class="bar-n" style="color:#0d4f8a">${n}</span>
        </div>
      </div>
    </div>`).join('');
  
  const topT=Object.entries(tierC).sort((a,b)=>b[1]-a[1]);
  const mt=topT[0]?.[1]||1;
  document.getElementById('tierChart').innerHTML=topT.map(([t,n])=>`
    <div class="bar-row">
      <div class="bar-lbl">${t}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${Math.round(n/mt*100)}%;background:#eceafe;border-right:2px solid #7F77DD">
          <span class="bar-n" style="color:#3d2fa0">${n.toLocaleString()}</span>
        </div>
      </div>
    </div>`).join('');
  
  const topOl=Object.entries(olC).sort((a,b)=>b[1]-a[1]).slice(0,8);
  document.getElementById('olChart').innerHTML=topOl.map(([k,n])=>`
    <div class="ol-row">
      <div class="ol-n">${k.split('+').map(s=>`<span class="badge ${SOURCE_MAP[s]||'b-multi'}">${s}</span>`).join('')}</div>
      <div class="ol-c">${n.toLocaleString()} shared</div>
    </div>`).join('');
}
